name: Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      mod_version: ${{ steps.version.outputs.mod_version }}
      release_version: ${{ steps.version.outputs.release_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive build version
        id: version
        run: |
          MOD_VERSION="$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          else
            RELEASE_VERSION="$MOD_VERSION"
          fi
          echo "mod_version=$MOD_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release jars
        run: ./gradlew clean build prepareReleaseArtifacts -Prelease_version="${{ steps.version.outputs.release_version }}"

      - name: Upload release jars
        uses: actions/upload-artifact@v4
        with:
          name: release-jars
          path: releases/*.jar

  latest-release:
    if: github.ref_type == 'branch'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: latest-release
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release jars
        uses: actions/download-artifact@v4
        with:
          name: release-jars
          path: releases

      - name: Refresh latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${GITHUB_SHA}"
          git push origin refs/tags/latest --force

      - name: Recreate latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag -y || true
          git tag -f latest "${GITHUB_SHA}"
          git push origin refs/tags/latest --force
          gh release create latest \
            "releases/aether-remote-control-${{ needs.build.outputs.mod_version }}.jar" \
            "releases/aether-remote-control-latest.jar" \
            --title "Latest" \
            --notes "Built from ${GITHUB_SHA}" \
            --latest

  version-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release jars
        uses: actions/download-artifact@v4
        with:
          name: release-jars
          path: releases

      - name: Publish versioned GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Aether Remote Control ${{ needs.build.outputs.release_version }}
          make_latest: true
          files: |
            releases/aether-remote-control-${{ needs.build.outputs.release_version }}.jar
            releases/aether-remote-control-latest.jar
